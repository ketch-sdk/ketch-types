name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Default permissions for all jobs (least privilege)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        node-version:
          - 20.x
          - 22.x
          - 23.x

    name: Node ${{ matrix.node-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Lint files
        run: npm run lint

      - name: Build library
        run: npm run all

  release:
    needs: build

    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    runs-on: ubuntu-latest

    outputs:
      version-patch: ${{ format('{0}.{1}.{2}', steps.version.outputs.version-major-only, steps.version.outputs.version-minor-only, steps.version.outputs.version-patch-only) }}

    permissions:
      contents: write    # Required to create releases
      id-token: write    # Required for npm OIDC Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Generate next version
        id: version
        uses: conventional-actions/next-version@1b3e4803a0bdf7435ba7bb5ace077445ed54e82a # v1.1.8

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Set package version
        uses: conventional-actions/write-version@77c6c9d20094108d23984deb1af56dd730166bd8  # v1
        with:
          output_path: package.json
          version: ${{ format('{0}.{1}.{2}', steps.version.outputs.version-major-only, steps.version.outputs.version-minor-only, steps.version.outputs.version-patch-only) }}

      - name: Install Dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build library
        run: npm run build

      - name: Publish (npmjs) via Trusted Publishing
        run: |
          # Unset NPM_CONFIG_USERCONFIG to ignore GitHub Packages .npmrc
          unset NPM_CONFIG_USERCONFIG
          npm publish --provenance --ignore-scripts --access public --registry https://registry.npmjs.org/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 90

      - name: Create Release
        uses: conventional-actions/create-release@c025b7306d14a25901b72486f97f3ebe7662a8ed # v1.0.31
        with:
          tag_name: ${{ steps.version.outputs.version }}

  bump-semaphore:
    name: Bump semaphore ketch-types dependency
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout semaphore
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ketch-com/semaphore
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Setup npmrc for ketch-com
        uses: conventional-actions/setup-npmrc@e851e66a09d6ad9301d4c7604f3493f90febef10 # v1
        with:
          always-auth: true
          scope: ketch-com
          token: ${{ secrets.GH_TOKEN }}

      - name: Bump ketch-types version
        run: npm pkg set dependencies.@ketch-sdk/ketch-types="^${{ needs.release.outputs.version-patch }}"

      - name: Update package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Import GPG key
        uses: conventional-actions/import-gpg@e14bec88da3bf2dcb7949ee51dc6087630664928 # v1.0.2
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create branch and commit
        run: |
          VERSION="${{ needs.release.outputs.version-patch }}"
          BRANCH="chore/bump-ketch-types-${VERSION}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: bump ketch-types to ${VERSION}"
          git push origin "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Close stale bump PRs
        run: |
          gh pr list \
            --repo ketch-com/semaphore \
            --search "chore: bump ketch-types in:title" \
            --state open \
            --json number \
            --jq '.[].number' | \
          xargs -r -I {} gh pr close {} \
            --repo ketch-com/semaphore \
            --comment "Superseded by newer version bump"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create PR
        run: |
          VERSION="${{ needs.release.outputs.version-patch }}"
          gh pr create \
            --repo ketch-com/semaphore \
            --title "chore: bump ketch-types to ${VERSION}" \
            --body "## Description of this change
          > Bumps ketch-types to ${VERSION}

          ## Why is this change being made?
          - [x] Chore (non-functional changes)
          - [ ] Bug fix (non-breaking change that fixes an issue)
          - [ ] New feature (non-breaking change that adds functionality)
          - [ ] Breaking change (fix or feature that would cause existing functionality to not work as expected)

          ## How was this tested? How can the reviewer verify your testing?
          > Automated dependency bump

          ## Related issues

          ## Checklist
          - [ ] I have added tests to cover my changes.
          - [x] All new and existing tests passed.
          - [x] I have evaluated the security impact of this change, and [OWASP Secure Coding Practices](https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/migrated_content#) have been observed.
          - [x] I have informed stakeholders of my changes." \
            --head "chore/bump-ketch-types-${VERSION}" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
